<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Cadastro - Burger House</title>


  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fff8e1;
    }

    header {
      background: #b71c1c;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 80px);
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #b71c1c;
    }

    label {
      display: block;
      margin-top: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #fbc02d;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .link {
      margin-top: 15px;
      text-align: center;
    }

    .link a {
      color: #b71c1c;
      text-decoration: none;
      font-weight: bold;
    }
  </style>

</head>

<body>

  <header>Burger House</header>

  <div class="container">
    <div class="card">
      <h2>Cadastro</h2>

      <form action="/cadastrar_usuario" method="post">
        <label>Nome</label>
        <input type="text" name="nome" required>

        <label>Usuário</label>
        <input type="text" name="usuario" required>

        <label>Senha</label>
        <input type="password" name="senha" required>

        <button type="submit">Cadastrar</button>
      </form>

      <div class="link">
        Já tem cadastro? <a href="/">Voltar</a>
      </div>
    </div>
  </div>

</body>

</html>
